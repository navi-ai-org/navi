[workspace]
members = [
    "crates/navi-cli",
    "crates/navi-core",
    "crates/navi-mcp",
    "crates/navi-openai",
    "crates/navi-plugin-api",
    "crates/navi-plugin-host",
    "crates/navi-sdk",
    "crates/navi-tui",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
directories = "6"
libloading = "0.9"
ratatui = "0.30"
reqwest = { version = "0.13", features = ["json", "rustls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.46.5", default-features = false }
syntect = "5"
async-stream = "0.3"
agent-client-protocol = "0.12.1"
futures-util = "0.3"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
rmcp = { version = "1.7.0", default-features = false, features = ["client", "transport-child-process"] }
toml = "1"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3"
wiremock = "0.6"
navi-core = { path = "crates/navi-core" }
navi-mcp = { path = "crates/navi-mcp" }
navi-openai = { path = "crates/navi-openai" }
navi-plugin-api = { path = "crates/navi-plugin-api" }
navi-plugin-host = { path = "crates/navi-plugin-host" }
navi-sdk = { path = "crates/navi-sdk" }
navi-tui = { path = "crates/navi-tui" }
