[workspace]
members = [
    "crates/navi-cli",
    "crates/navi-core",
    "crates/navi-openai",
    "crates/navi-plugin-api",
    "crates/navi-plugin-host",
    "crates/navi-tui",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
directories = "5"
libloading = "0.8"
ratatui = "0.29"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "process", "rt-multi-thread"] }
toml = "0.8"
tempfile = "3"
navi-core = { path = "crates/navi-core" }
navi-openai = { path = "crates/navi-openai" }
navi-plugin-api = { path = "crates/navi-plugin-api" }
navi-plugin-host = { path = "crates/navi-plugin-host" }
navi-tui = { path = "crates/navi-tui" }
