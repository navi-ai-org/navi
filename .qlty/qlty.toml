# Qlty — https://qlty.sh (lint, format, smells, security, coverage upload)
# Local: `just analyze` · `just qlty-check` · `just coverage-upload`

config_version = "0"

exclude_patterns = [
  "target/**",
  "**/target/**",
  ".navi/**",
  "mutants.out/**",
  "mutants.out.old/**",
  "coverage/**",
]

test_patterns = [
  "**/tests/**",
  "**/test/**",
  "**/*_tests.rs",
  "**/tests.rs",
]

[language.rust.smells.duplication]
filter_patterns = ["(use_declaration _)"]
nodes_threshold = 40

[[source]]
name = "default"
default = true
repository = "https://github.com/qltysh/qlty.git"
tag = "v0.447.0"

[[plugin]]
name = "clippy"

[[plugin]]
name = "rustfmt"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "trivy"

[[plugin]]
name = "gitleaks"

[[plugin]]
name = "ripgrep"

[[plugin]]
name = "markdownlint"

[[plugin]]
name = "actionlint"