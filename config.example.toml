# NAVI Configuration Example
#
# Copy this file to ~/.config/navi/config.toml (global) or .navi/config.toml (project)
# Later sources override earlier ones. Defaults: provider "openai", model "gpt-5.5".

[model]
provider = "openai"
name = "gpt-5.5"

[approvals]
allow_reads = true
require_for_writes = true
require_for_commands = true

[security]
restrict_paths_to_project = true
protect_git_metadata = true
redact_secrets_in_sessions = true
allow_external_plugins = false
blocked_commands = ["rm", "rmdir", "shred", "mkfs", "dd", "sudo", "su", "doas"]

[harness]
profile = "auto" # auto, small, or medium

[logging]
enabled = true
level = "info"
file_enabled = true
stdout_enabled = false
include_payloads = false

[skills]
enabled = false
dirs = [".navi/skills"]
active = []

[mcp]
enabled = false

