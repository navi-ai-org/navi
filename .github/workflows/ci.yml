name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  CARGO_TEST_THREADS: "4"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - name: Build lite binary
        run: cargo build -p navi-lite --bin navi-lite

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace lib/bin tests
        run: cargo test --workspace --locked --lib --bins -- --test-threads=4

      - name: Run integration tests (skip known-hanging headless e2e)
        # headless_e2e hangs on CI (mock multi-turn never completes); skip until fixed.
        run: >
          cargo test --workspace --locked --tests
          -- --test-threads=4
          --skip headless_cli_runs_engine_provider_and_read_tool
        timeout-minutes: 25

  # Single green check for branch protection / release gates.
  ci-ok:
    name: CI OK
    if: always()
    needs: [fmt, check, clippy, test]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        run: |
          set -euo pipefail
          echo "fmt=${{ needs.fmt.result }}"
          echo "check=${{ needs.check.result }}"
          echo "clippy=${{ needs.clippy.result }}"
          echo "test=${{ needs.test.result }}"
          for r in \
            "${{ needs.fmt.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.test.result }}"
          do
            if [[ "$r" != "success" ]]; then
              echo "CI failed (job result: $r)" >&2
              exit 1
            fi
          done
          echo "All CI jobs passed."
