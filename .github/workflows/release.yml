# Release workflow — tests, then builds portable navi binaries and publishes
# a GitHub Release.
#
# Trigger: push a version tag
#   git tag v0.2.1
#   git push origin v0.2.1
#
# Gates: `test` must pass before any platform build or publish step.
#
# Linux builds use Alpine (musl) containers so the binary runs on:
#   Alpine, Debian bookworm+, Ubuntu, Amazon Linux, and most enterprise containers.
#
# Assets (names must match scripts/install.sh and scripts/install.ps1):
#   navi-linux-x64.tar.gz
#   navi-linux-arm64.tar.gz
#   navi-darwin-x64.tar.gz
#   navi-darwin-arm64.tar.gz
#   navi-win32-x64.zip
#   SHA256SUMS.txt
#   SHA256SUMS.txt.sigstore.json
#
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release (e.g. v0.2.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_TEST_THREADS: "4"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Quality gate (must pass before multi-platform builds) ─────────────────

  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-test-gate
          shared-key: release-test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Core package tests (release gate)
        # Gate the published navi binary on the crates it actually ships.
        # Skip wasm-plugin load test (needs real wasm fixtures not present on CI).
        run: >
          cargo test --locked --lib --bins
          -p navi-core -p navi-openai -p navi-providers
          -p navi-sdk -p navi-tui -p navi-cli -p navi-vfs
          -- --test-threads=4
          --skip build_local_tooling_loads_installed_wasm_plugin_store
  # ── Linux x64 musl (Alpine container — JS actions only work on x64) ────────

  build-linux-x64:
    name: Build navi-linux-x64
    needs: [test]
    runs-on: ubuntu-latest
    container: rust:1-alpine
    steps:
      - name: Install Alpine build deps
        run: |
          set -eu
          apk add --no-cache \
            build-base clang lld make protoc pkgconfig \
            git curl ca-certificates file

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-musl-x64
          shared-key: release-musl

      # Host triple on rust:1-alpine is musl → target/release/navi
      - name: Build release binaries (musl)
        run: cargo build -p navi-cli -p navi-lite --locked --release

      - name: Strip + smoke test
        run: |
          set -eu
          BIN=target/release/navi
          LITE_BIN=target/release/navi-lite
          strip "$BIN" || true
          strip "$LITE_BIN" || true
          file "$BIN"
          file "$LITE_BIN"
          ldd "$BIN" 2>&1 || true
          ldd "$LITE_BIN" 2>&1 || true
          "$BIN" --help >/dev/null
          "$LITE_BIN" --help >/dev/null
          ls -lh "$BIN"
          ls -lh "$LITE_BIN"

      - name: Package
        run: |
          set -eu
          mkdir -p dist
          tar -C target/release -czf dist/navi-linux-x64.tar.gz navi
          tar -C target/release -czf dist/navi-lite-linux-x64.tar.gz navi-lite
          for a in navi-linux-x64.tar.gz navi-lite-linux-x64.tar.gz; do
            members=$(tar -tzf "dist/$a")
            case "$a" in
              navi-linux-*) test "$members" = "navi" ;;
              navi-lite-*) test "$members" = "navi-lite" ;;
            esac
            ls -lh "dist/$a"
          done

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: navi-linux-x64
          path: |
            dist/navi-linux-x64.tar.gz
            dist/navi-lite-linux-x64.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Stage + upload npm binary
        run: |
          set -eu
          cp target/release/navi npm/navi/npm/linux-x64/navi
          chmod +x npm/navi/npm/linux-x64/navi
      - uses: actions/upload-artifact@v4
        with:
          name: npm-linux-x64
          path: npm/navi/npm/linux-x64/
          if-no-files-found: error
          retention-days: 14

  # ── Linux arm64 musl via Docker Alpine (GHA Alpine containers break JS actions on arm) ─

  build-linux-arm64:
    name: Build navi-linux-arm64
    needs: [test]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build inside rust:1-alpine (native arm64 musl)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/src:rw \
            -w /src \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/target-musl \
            rust:1-alpine \
            sh -c '
              set -eu
              apk add --no-cache \
                build-base clang lld make protoc pkgconfig \
                git curl ca-certificates file
              cargo build -p navi-cli -p navi-lite --locked --release
              strip /tmp/target-musl/release/navi || true
              strip /tmp/target-musl/release/navi-lite || true
              file /tmp/target-musl/release/navi
              file /tmp/target-musl/release/navi-lite
              ldd /tmp/target-musl/release/navi 2>&1 || true
              ldd /tmp/target-musl/release/navi-lite 2>&1 || true
              /tmp/target-musl/release/navi --help >/dev/null
              /tmp/target-musl/release/navi-lite --help >/dev/null
              mkdir -p /src/target/release
              cp /tmp/target-musl/release/navi /src/target/release/navi
              cp /tmp/target-musl/release/navi-lite /src/target/release/navi-lite
            '

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C target/release -czf dist/navi-linux-arm64.tar.gz navi
          tar -C target/release -czf dist/navi-lite-linux-arm64.tar.gz navi-lite
          for a in navi-linux-arm64.tar.gz navi-lite-linux-arm64.tar.gz; do
            members=$(tar -tzf "dist/$a")
            case "$a" in
              navi-linux-*) test "$members" = "navi" ;;
              navi-lite-*) test "$members" = "navi-lite" ;;
            esac
            ls -lh "dist/$a"
          done

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: navi-linux-arm64
          path: |
            dist/navi-linux-arm64.tar.gz
            dist/navi-lite-linux-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Stage + upload npm binary
        run: |
          set -euo pipefail
          cp target/release/navi npm/navi/npm/linux-arm64/navi
          chmod +x npm/navi/npm/linux-arm64/navi
      - uses: actions/upload-artifact@v4
        with:
          name: npm-linux-arm64
          path: npm/navi/npm/linux-arm64/
          if-no-files-found: error
          retention-days: 14

  # ── macOS + Windows ────────────────────────────────────────────────────────

  build-desktop:
    name: Build ${{ matrix.archive }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: navi-darwin-x64
            npm_platform: darwin-x64

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: navi-darwin-arm64
            npm_platform: darwin-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: navi-win32-x64
            npm_platform: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          shared-key: release-desktop

      - name: Build release binaries
        run: cargo build -p navi-cli -p navi-lite --locked --release --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/navi"
          LITE_BIN="target/${{ matrix.target }}/release/navi-lite"
          strip "$BIN" || true
          strip "$LITE_BIN" || true
          ls -lh "$BIN"
          ls -lh "$LITE_BIN"
          file "$BIN" || true
          file "$LITE_BIN" || true

      - name: Smoke test binary (native arch only)
        if: |
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') ||
          (runner.os == 'macOS' && matrix.target == 'x86_64-apple-darwin' && runner.arch == 'X64') ||
          runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "./target/${{ matrix.target }}/release/navi.exe" --help >/dev/null
            "./target/${{ matrix.target }}/release/navi-lite.exe" --help >/dev/null
          else
            "./target/${{ matrix.target }}/release/navi" --help >/dev/null
            "./target/${{ matrix.target }}/release/navi-lite" --help >/dev/null
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive }}.tar.gz" navi
          # navi-lite archive name: navi-lite-darwin-x64 / navi-lite-darwin-arm64
          lite_archive=$(echo "${{ matrix.archive }}" | sed 's/^navi-/navi-lite-/')
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${lite_archive}.tar.gz" navi-lite
          members=$(tar -tzf "dist/${{ matrix.archive }}.tar.gz")
          lite_members=$(tar -tzf "dist/${lite_archive}.tar.gz")
          if [[ "$members" != "navi" || "$lite_members" != "navi-lite" ]]; then
            echo "invalid archive members: navi=[$members] lite=[$lite_members]" >&2
            exit 1
          fi
          ls -lh "dist/${{ matrix.archive }}.tar.gz" "dist/${lite_archive}.tar.gz"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/navi.exe" `
            -DestinationPath "dist/${{ matrix.archive }}.zip" -Force
          Compress-Archive -Path "target/${{ matrix.target }}/release/navi-lite.exe" `
            -DestinationPath "dist/navi-lite-win32-x64.zip" -Force
          Get-Item "dist/${{ matrix.archive }}.zip" | Format-List Name, Length
          Get-Item "dist/navi-lite-win32-x64.zip" | Format-List Name, Length

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Stage npm binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/navi" "npm/navi/npm/${{ matrix.npm_platform }}/navi"
          chmod +x "npm/navi/npm/${{ matrix.npm_platform }}/navi"

      - name: Stage npm binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/navi.exe" `
            "npm/navi/npm/${{ matrix.npm_platform }}/navi.exe" -Force

      - name: Upload npm package tree
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}
          path: npm/navi/npm/${{ matrix.npm_platform }}/
          if-no-files-found: error
          retention-days: 14

  # ── Publish GitHub Release ──────────────────────────────────────────────────

  release:
    name: GitHub Release
    needs: [build-linux-x64, build-linux-arm64, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag matches workspace version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ env.RELEASE_TAG }}"
          TAG="${TAG#v}"
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]/ { in_pkg=1; next }
              /^\[/ { in_pkg=0 }
              in_pkg && /^version[[:space:]]*=/ {
                gsub(/"/, "", $3); print $3; exit
              }
            ' Cargo.toml
          )
          if [[ -z "$CARGO_VERSION" ]]; then
            echo "Could not read workspace.package.version from Cargo.toml" >&2
            exit 1
          fi
          echo "tag version:    $TAG"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [[ "$TAG" != "$CARGO_VERSION" ]]; then
            echo "error: tag v$TAG does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: navi-*
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          expected=(
            navi-linux-x64.tar.gz
            navi-linux-arm64.tar.gz
            navi-darwin-x64.tar.gz
            navi-darwin-arm64.tar.gz
            navi-win32-x64.zip
            navi-lite-linux-x64.tar.gz
            navi-lite-linux-arm64.tar.gz
            navi-lite-darwin-x64.tar.gz
            navi-lite-darwin-arm64.tar.gz
            navi-lite-win32-x64.zip
          )
          for f in "${expected[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "missing required archive: $f" >&2
              ls -la
              exit 1
            fi
          done
          # sha256sum prints "HASH  name" (two spaces); do not use a dummy field.
          sha256sum "${expected[@]}" | tee SHA256SUMS.txt
          while read -r hash name; do
            name="${name#\*}" # strip optional binary-mode marker
            [[ "$hash" =~ ^[0-9a-f]{64}$ ]] || { echo "bad hash: $hash"; exit 1; }
            [[ -n "$name" && -f "$name" ]] || { echo "sums name missing file: [$name]"; exit 1; }
          done < SHA256SUMS.txt
          ls -lh

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign SHA256SUMS with Sigstore (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            artifacts/SHA256SUMS.txt
          cosign verify-blob \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: NAVI ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
            artifacts/SHA256SUMS.txt.sigstore.json
          # Body is replaced after publish from .github/release-notes-*.md when needed.
          # Default stub keeps the section structure consistent.
          body: |
            ## New Features

            _See release notes._

            ## Bug Fixes

            _See release notes._

            ## Documentation

            _See release notes._

            ## Chores

            _See release notes._

            ## Changelog

            Full changelog: https://github.com/${{ github.repository }}/compare/${{ env.RELEASE_TAG }}...${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
