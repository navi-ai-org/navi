# Release workflow — builds portable navi binaries and publishes a GitHub Release.
#
# Trigger: push a version tag
#   git tag v0.2.1
#   git push origin v0.2.1
#
# Linux builds use Alpine (musl) containers so the binary runs on:
#   Alpine, Debian bookworm+, Ubuntu, Amazon Linux, and most enterprise containers.
#
# Assets (names must match scripts/install.sh and scripts/install.ps1):
#   navi-linux-x64.tar.gz
#   navi-linux-arm64.tar.gz
#   navi-darwin-x64.tar.gz
#   navi-darwin-arm64.tar.gz
#   navi-win32-x64.zip
#   SHA256SUMS.txt
#   SHA256SUMS.txt.sigstore.json
#
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release (e.g. v0.2.1)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Linux (musl via Alpine) — portable across distros & containers ─────────

  build-linux:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.os }}
    container: rust:1-alpine
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: navi-linux-x64
            npm_platform: linux-x64
          - os: ubuntu-24.04-arm
            archive: navi-linux-arm64
            npm_platform: linux-arm64

    steps:
      - name: Install Alpine build deps
        run: |
          set -eu
          apk add --no-cache \
            build-base clang lld make protoc pkgconfig \
            git curl ca-certificates file

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-musl-${{ matrix.archive }}
          shared-key: release-musl

      # Host triple on rust:1-alpine is *-unknown-linux-musl → target/release/navi
      - name: Build release binary (musl)
        run: cargo build -p navi-cli --locked --release

      - name: Strip + smoke test
        run: |
          set -eu
          BIN=target/release/navi
          strip "$BIN" || true
          file "$BIN"
          # static-pie / musl — should not depend on glibc
          ldd "$BIN" 2>&1 || true
          "$BIN" --help >/dev/null
          ls -lh "$BIN"

      - name: Package
        run: |
          set -eu
          mkdir -p dist
          tar -C target/release -czf "dist/${{ matrix.archive }}.tar.gz" navi
          members=$(tar -tzf "dist/${{ matrix.archive }}.tar.gz")
          test "$members" = "navi"
          ls -lh "dist/${{ matrix.archive }}.tar.gz"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Stage npm binary
        run: |
          set -eu
          cp target/release/navi "npm/navi/npm/${{ matrix.npm_platform }}/navi"
          chmod +x "npm/navi/npm/${{ matrix.npm_platform }}/navi"

      - name: Upload npm package tree
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}
          path: npm/navi/npm/${{ matrix.npm_platform }}/
          if-no-files-found: error
          retention-days: 14

  # ── macOS + Windows ────────────────────────────────────────────────────────

  build-desktop:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: navi-darwin-x64
            npm_platform: darwin-x64

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: navi-darwin-arm64
            npm_platform: darwin-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: navi-win32-x64
            npm_platform: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          shared-key: release-desktop

      - name: Build release binary
        run: cargo build -p navi-cli --locked --release --target ${{ matrix.target }}

      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/navi"
          strip "$BIN" || true
          ls -lh "$BIN"
          file "$BIN" || true

      - name: Smoke test binary (native arch only)
        if: |
          (runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') ||
          (runner.os == 'macOS' && matrix.target == 'x86_64-apple-darwin' && runner.arch == 'X64') ||
          runner.os == 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            "./target/${{ matrix.target }}/release/navi.exe" --help >/dev/null
          else
            "./target/${{ matrix.target }}/release/navi" --help >/dev/null
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive }}.tar.gz" navi
          mapfile -t members < <(tar -tzf "dist/${{ matrix.archive }}.tar.gz")
          if [[ ${#members[@]} -ne 1 || "${members[0]}" != "navi" ]]; then
            echo "invalid archive members: ${members[*]}" >&2
            exit 1
          fi
          ls -lh "dist/${{ matrix.archive }}.tar.gz"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/navi.exe" `
            -DestinationPath "dist/${{ matrix.archive }}.zip" -Force
          Get-Item "dist/${{ matrix.archive }}.zip" | Format-List Name, Length

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}.*
          if-no-files-found: error
          retention-days: 14

      - name: Stage npm binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/navi" "npm/navi/npm/${{ matrix.npm_platform }}/navi"
          chmod +x "npm/navi/npm/${{ matrix.npm_platform }}/navi"

      - name: Stage npm binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/navi.exe" `
            "npm/navi/npm/${{ matrix.npm_platform }}/navi.exe" -Force

      - name: Upload npm package tree
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm_platform }}
          path: npm/navi/npm/${{ matrix.npm_platform }}/
          if-no-files-found: error
          retention-days: 14

  # ── Publish GitHub Release ──────────────────────────────────────────────────

  release:
    name: GitHub Release
    needs: [build-linux, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag matches workspace version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ env.RELEASE_TAG }}"
          TAG="${TAG#v}"
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]/ { in_pkg=1; next }
              /^\[/ { in_pkg=0 }
              in_pkg && /^version[[:space:]]*=/ {
                gsub(/"/, "", $3); print $3; exit
              }
            ' Cargo.toml
          )
          if [[ -z "$CARGO_VERSION" ]]; then
            echo "Could not read workspace.package.version from Cargo.toml" >&2
            exit 1
          fi
          echo "tag version:    $TAG"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [[ "$TAG" != "$CARGO_VERSION" ]]; then
            echo "error: tag v$TAG does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: navi-*
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          expected=(
            navi-linux-x64.tar.gz
            navi-linux-arm64.tar.gz
            navi-darwin-x64.tar.gz
            navi-darwin-arm64.tar.gz
            navi-win32-x64.zip
          )
          for f in "${expected[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "missing required archive: $f" >&2
              ls -la
              exit 1
            fi
          done
          sha256sum "${expected[@]}" | tee SHA256SUMS.txt
          while read -r hash _ name; do
            [[ "$hash" =~ ^[0-9a-f]{64}$ ]] || { echo "bad hash: $hash"; exit 1; }
            [[ -f "$name" ]] || { echo "sums name missing file: $name"; exit 1; }
          done < SHA256SUMS.txt
          ls -lh

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign SHA256SUMS with Sigstore (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            artifacts/SHA256SUMS.txt
          cosign verify-blob \
            --bundle artifacts/SHA256SUMS.txt.sigstore.json \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@refs/tags/v.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            artifacts/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: NAVI ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
            artifacts/SHA256SUMS.txt.sigstore.json
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/navi-ai-org/navi/main/scripts/install.sh | sh
            ```

            **Windows:** `irm https://raw.githubusercontent.com/navi-ai-org/navi/main/scripts/install.ps1 | iex`

            ### Linux / containers
            Linux builds are **musl** (Alpine toolchain) so the same binary runs on
            Alpine, Debian, Ubuntu, Amazon Linux, and most enterprise container images.

            ### Security
            - Archive SHA-256 must match `SHA256SUMS.txt` (installer hard-fails otherwise)
            - `SHA256SUMS.txt` is Sigstore-signed (GitHub Actions OIDC)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
