# rustquty — local quality scanner (https://github.com/enrell/rustquty)
# Run: just quality · just quality-doctor · just quality-baseline

[profile]
default = "full"

[collectors]
# Mutation testing is slow; use `just quality-deep` to include mutants.
mutants = false
# Requires deny.toml in the project root.
# deny = true

[output]
dir = "quality"

# Collectors use cargo-nextest when installed (.config/nextest.toml sets 4 threads).
# Coverage uses cargo-llvm-cov. License/advisory policy: deny.toml.